name: Build KometSwiftUI

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'KometSwiftUI/**'
      - '.github/workflows/swiftui_build.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'KometSwiftUI/**'

jobs:
  # ── Job 1: Compile check via Swift PM (no .xcodeproj needed) ───────────────
  swift-check:
    name: Swift compile check
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Swift version
        run: swift --version

      - name: Build (iOS Simulator SDK)
        working-directory: KometSwiftUI
        run: |
          xcodebuild build \
            -scheme Komet \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO


  # ── Job 2: xcodebuild simulator (needs Komet.xcodeproj committed) ──────────
  xcode-build:
    name: Xcode simulator build
    runs-on: macos-15
    # Remove the 'if' line below once Komet.xcodeproj is committed to the repo
    if: ${{ false }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Build (iOS Simulator SDK)
        working-directory: KometSwiftUI
        run: |
          xcodebuild build \
            -scheme Komet \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

  # ── Job 3: Archive + TestFlight (push to main only, needs secrets) ──────────
  # Reuses the same secrets already defined for the Flutter ios_deploy workflow:
  #   CERTIFICATE_BASE64, CERTIFICATE_PASSWORD, PROVISIONING_PROFILE_BASE64
  #   APPLE_KEY_ID, APPLE_ISSUER_ID, APPLE_KEY_CONTENT
  #
  # Also needs Komet.xcodeproj committed before enabling this job.
  archive:
    name: Archive & upload to TestFlight
    runs-on: macos-15
    needs: xcode-build
    if: ${{ false }} # change to: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Install signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/komet-swiftui.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Save keychain password for cleanup step
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/komet.mobileprovision
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          PP_UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -o - -)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

      - name: Generate ExportOptions.plist
        run: |
          PP_PATH=$RUNNER_TEMP/komet.mobileprovision
          TEAM_ID=$(security cms -D -i "$PP_PATH" | plutil -extract TeamIdentifier.0 raw -o - -)
          PP_NAME=$(security cms -D -i "$PP_PATH" | plutil -extract Name raw -o - -)
          BUNDLE_ID=$(security cms -D -i "$PP_PATH" | plutil -extract Entitlements.application-identifier raw -o - - | sed 's/^[^.]*\.//')

          cat > KometSwiftUI/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>$BUNDLE_ID</key>
                  <string>$PP_NAME</string>
              </dict>
          </dict>
          </plist>
          EOF

      - name: Archive
        working-directory: KometSwiftUI
        run: |
          TEAM_ID=$(security cms -D -i $RUNNER_TEMP/komet.mobileprovision | plutil -extract TeamIdentifier.0 raw -o - -)
          CERT_NAME=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Apple Distribution" | head -1 | grep -o '".*"' | tr -d '"')

          xcodebuild archive \
            -project Komet.xcodeproj \
            -scheme Komet \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Komet.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CERT_NAME" \
            2>&1 | tee $RUNNER_TEMP/xcodebuild.log

          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            grep -i "error:" $RUNNER_TEMP/xcodebuild.log | head -30
            exit 1
          fi

      - name: Export IPA
        working-directory: KometSwiftUI
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Komet.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to TestFlight
        env:
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_KEY_CONTENT: ${{ secrets.APPLE_KEY_CONTENT }}
        run: |
          echo "$APPLE_KEY_CONTENT" > $RUNNER_TEMP/AuthKey_$APPLE_KEY_ID.p8
          xcrun altool --upload-app \
            --type ios \
            --file $RUNNER_TEMP/export/Komet.ipa \
            --apiKey "$APPLE_KEY_ID" \
            --apiIssuer "$APPLE_ISSUER_ID" \
            --private-key-path $RUNNER_TEMP/AuthKey_$APPLE_KEY_ID.p8

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Komet-SwiftUI.ipa
          path: ${{ runner.temp }}/export/Komet.ipa
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ${{ runner.temp }}/xcodebuild.log
          retention-days: 7

      - name: Cleanup secrets
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f $RUNNER_TEMP/AuthKey_*.p8 $RUNNER_TEMP/komet.mobileprovision
